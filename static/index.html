<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Escape-Room Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-titles">
        <h1>AI Escape-Room Agent</h1>
        <p>Observable Reasoning Demonstration</p>
      </div>
      <div class="step-indicator">
        Step <span id="step-counter">0</span>
      </div>
    </header>

    <main class="main-layout">
      <!-- Left 60%: Room Map -->
      <section class="panel room-map-panel">
        <header class="panel-header">
          <h2>Room Map</h2>
        </header>
        <div class="room-map-viewport">
          <div id="room-canvas" class="room-canvas">
            <svg id="relation-layer" class="svg-layer"></svg>
            <svg id="inference-layer" class="svg-layer"></svg>
            <!-- Room objects generated by JS -->
          </div>
        </div>
      </section>

      <!-- Right 40%: Agent Mind Panel -->
      <section class="panel mind-panel">
        <header class="panel-header">
          <h2>Agent Mind</h2>
        </header>

        <div class="mind-sections">
          <!-- Stack 1: Observed Facts -->
          <article class="mind-box observed-box">
            <h3>Observed Facts</h3>
            <div class="list-container">
              <ul id="observed-facts-list" class="fact-list"></ul>
            </div>
          </article>

          <!-- Stack 2: Inferred Facts -->
          <article class="mind-box inferred-box">
            <h3>Inferred Facts</h3>
            <div class="list-container">
              <ul id="inferred-facts-list" class="fact-list"></ul>
            </div>
          </article>

          <!-- Stack 3: This Step -->
          <article class="mind-box this-step-box">
            <h3>This Step</h3>
            <div id="this-step-content" class="this-step-content">
              <p class="placeholder-text">Waiting for agent to act...</p>
            </div>
          </article>
        </div>

        <!-- History Strip -->
        <div class="history-strip-container">
          <h3>Step History</h3>
          <div id="history-strip" class="history-strip"></div>
        </div>
      </section>
    </main>

    <!-- Bottom: Control Bar -->
    <footer class="control-bar">
      <div class="control-group">
        <button id="btn-step" class="btn btn-primary" type="button">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
          Step
        </button>
        <button id="btn-reset" class="btn btn-secondary" type="button">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          Reset
        </button>
      </div>
      
      <div class="control-group">
        <span class="pill-label">Slow Step</span>
        <label class="switch">
          <input type="checkbox" id="toggle-slow-step">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="control-group">
        <span class="pill-label">Auto-play</span>
        <label class="switch">
          <input type="checkbox" id="toggle-autoplay">
          <span class="slider round"></span>
        </label>
        
        <div class="speed-control">
          <label for="slider-speed" class="sr-only">Speed</label>
          <input type="range" id="slider-speed" min="300" max="2000" step="50" value="800">
          <span id="speed-label" class="speed-label">800ms</span>
        </div>
      </div>
    </footer>
  </div>

  <!-- Win Overlay -->
  <div id="win-overlay" class="win-overlay hidden">
    <div id="confetti-container" class="confetti-container"></div>
    <div class="win-card">
      <h2>Agent escaped!</h2>
      <div class="win-stats">
        <div class="stat">
          <span class="stat-value" id="win-steps">0</span>
          <span class="stat-label">Steps</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="win-facts">0</span>
          <span class="stat-label">Inferred Facts</span>
        </div>
      </div>
      <button id="btn-replay" class="btn btn-primary btn-large" type="button">Replay Game</button>
    </div>
  </div>

  <!-- App logic -->
  <script type="module" src="/static/app.js"></script>
</body>
</html>
